name: Ghost Engine - Method 2 (Surgical)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  surgical-monetization:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Go & Python
        uses: actions/setup-go@v4
        with:
          go-version: 'stable'
      
      - name: Install Tools
        run: |
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          pip install -r requirements.txt

      - name: Selective Discovery
        run: |
          # Elegimos 50 al azar
          shuf -n 50 targets.txt > active_targets.txt
          $(go env GOPATH)/bin/subfinder -dL active_targets.txt -t 100 -silent -o live_subs.txt

      - name: Run Surgical Engine
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          ADSTERRA_API_KEY: ${{ secrets.ADSTERRA_API_KEY }}
        run: |
          # Rutas actualizadas a la carpeta core y monetization
          python monetization/landing_gen.py
          python core/scanner.py

      - name: Save Progress to DB
        run: |
          git config --local user.email "bot@ghostengine.com"
          git config --local user.name "Ghost Bot"
          git add database/inventory.db
          git commit -m "Update inventory: +1 potential asset [skip ci]" || echo "No changes"
          git push
