name: Ghost Engine - Surgical Mode

on:
  schedule:
    - cron: '0 * * * *'  # Ejecución automática: Cada hora en punto
  workflow_dispatch:      # Permite botón manual en GitHub Actions

permissions:
  contents: write
  pages: write    
  id-token: write   

jobs:
  surgical-monetization:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Importante para evitar errores en el push

      - name: Setup Environment
        uses: actions/setup-go@v4
        with:
          go-version: 'stable'
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          pip install -r requirements.txt

      - name: Selective Discovery
        run: |
          # Mezclamos objetivos para variar el escaneo
          shuf -n 50 targets.txt > active_targets.txt
          $(go env GOPATH)/bin/subfinder -dL active_targets.txt -t 100 -silent -o live_subs.txt

      - name: Run Surgical Engine
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          # Usamos tu GH_PAT para que el bot pueda crear repositorios
        run: |
          # Generamos la landing y escaneamos
          python core/scanner.py

      - name: Save Persistence
        run: |
          git config --local user.email "bot@ghostengine.com"
          git config --local user.name "Ghost Bot"
          mkdir -p database
          git add database/inventory.db
          # El [skip ci] evita que el bot entre en un bucle infinito
          git commit -m "Update DB: Data persistence [skip ci]" || echo "No changes"
          git push origin main
