name: Ghost Engine - Auto Monetizer

on:
  schedule:
    - cron: '0 */6 * * *' # Corre cada 6 horas
  workflow_dispatch: # Botón de pánico/prueba manual

permissions:
  contents: write # Vital para guardar la base de datos

jobs:
  scan-and-monetize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 'stable'

      - name: Install Subfinder
        run: go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Deps
        run: pip install -r requirements.txt

      - name: Discover Subdomains
        run: |
          # Elige 50 targets al azar para evitar el timeout de 6 horas
          shuf -n 50 targets.txt > active_targets.txt
          # Ejecuta subfinder con hilos aumentados para velocidad
          $(go env GOPATH)/bin/subfinder -dL active_targets.txt -t 100 -silent -o live_subs.txt

      - name: Run Engine & Monetize
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
          ADSTERRA_API_KEY: ${{ secrets.ADSTERRA_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # 1. Generar la landing con tus links de Adsterra
          python monetization/landing_gen.py
          # 2. Escanear y tomar posesión automática
          python monetization/scanner.py

      - name: Save Results (Persistence)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Ghost Engine Bot"
          git add live_subs.txt database/inventory.db
          git commit -m "Ghost Engine: Actualización automática [skip ci]" || echo "Sin cambios"
          git push
