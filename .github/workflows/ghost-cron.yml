name: Ghost Engine - Surgical Mode

on:
  schedule:
    - cron: '0 * * * *'  # Ejecución automática: Cada hora en punto
  workflow_dispatch:      # Permite botón manual en GitHub Actions

permissions:
  contents: write
  pages: write    
  id-token: write   

jobs:
  surgical-monetization:
    runs-on: ubuntu-latest
    if: always()
    # Añadimos un timeout global al job por seguridad (máximo 1 hora)
    timeout-minutes: 60 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: actions/setup-go@v4
        with:
          go-version: 'stable'
          cache: true # Activamos caché para que no tarde tanto instalando
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          pip install -r requirements.txt

      
      - name: Selective Discovery
        run: |
          # Subimos a 500 objetivos para aumentar la probabilidad
          shuf -n 500 targets.txt > active_targets.txt
          
          # Aumentamos los hilos (-t 400) para ir a máxima velocidad
          timeout 10m $(go env GOPATH)/bin/subfinder -dL active_targets.txt -t 200 -silent -o live_subs.txt || echo "Timeout alcanzado, procesando hallazgos..."


      - name: Run Surgical Engine
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -s live_subs.txt ]; then
            echo "[*] Iniciando escaneo intensivo (Límite: 30 min)..."
            # Si el script tarda más de 30m, se corta y seguimos al siguiente paso
            timeout 30m python core/scanner.py || echo "Tiempo agotado, guardando lo encontrado..."
          else
            echo "Sin subdominios para procesar."
          fi

      - name: Save Persistence
        run: |
          git config --local user.email "bot@ghostengine.com"
          git config --local user.name "Ghost Bot"

          echo "Last run: $(date)" > heartbeat.txt
          
          # 1. Traemos lo que editaste en la web para que el bot lo sepa
          git fetch origin main
          
          # 2. Forzamos al bot a ponerse al día con la web sin borrar la DB nueva
          git reset --mixed origin/main
          
          # 3. Guardamos la base de datos actualizada
          git add database/inventory.db heartbeat.txt
          
          # 4. Hacemos el commit (el [skip ci] es vital para no entrar en bucle)
          git commit -m "Update DB: Data persistence [skip ci]" || echo "No changes"
          
          # 5. Empujamos los cambios "a la fuerza" para limpiar el historial
          git push origin main --force
