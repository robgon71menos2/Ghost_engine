name: Ghost Engine - Surgical Mode

on:
  schedule:
    - cron: '0 * * * *'  # Ejecución automática: Cada hora en punto
  workflow_dispatch:      # Permite botón manual en GitHub Actions

permissions:
  contents: write
  pages: write    
  id-token: write   

jobs:
  surgical-monetization:
    runs-on: ubuntu-latest
    # Añadimos un timeout global al job por seguridad (máximo 1 hora)
    timeout-minutes: 60 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: actions/setup-go@v4
        with:
          go-version: 'stable'
          cache: true # Activamos caché para que no tarde tanto instalando
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          pip install -r requirements.txt

      
      - name: Selective Discovery
        run: |
          # Subimos a 500 objetivos para aumentar la probabilidad
          shuf -n 400 targets.txt > active_targets.txt
          
          # Aumentamos los hilos (-t 400) para ir a máxima velocidad
          $(go env GOPATH)/bin/subfinder -dL active_targets.txt -t 400 -o live_subs.txt
      
      
      - name: Run Surgical Engine
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -s live_subs.txt ]; then
            echo "[*] Procesando hallazgos..."
            # Ponemos un timeout de 20 minutos al script de Python
            # para que siempre queden 5-10 min para guardar la DB.
            timeout 20m python core/scanner.py || echo "Tiempo de escaneo agotado, guardando progresos..."
          else
            echo "No se encontraron subdominios vivos."
          fi

      - name: Save Persistence
        if: always()  # <--- ESTO ES VITAL: Guarda aunque el paso anterior falle o dé timeout
        run: |
          git config --local user.email "bot@ghostengine.com"
          git config --local user.name "Ghost Bot"
          # ... (resto de tus comandos de git push)
