name: Ghost-Engine-24-7
on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta cada 6 horas (4 veces al día)
  workflow_dispatch: # Permite ejecución manual desde el botón de GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v3

      - name: Instalar Python y Go
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Herramientas (Subfinder)
        run: |
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          # Mover binario a ruta accesible
          sudo mv ~/go/bin/subfinder /usr/local/bin/

      - name: Instalar Dependencias Python
        run: |
          pip install -r requirements.txt

      - name: Descubrimiento de Subdominios
        # data/targets.txt debe contener dominios como 'adobe.com'
        run: |
          subfinder -dL data/targets.txt -silent -o live_subs.txt

      - name: Ejecutar Escáner de Vulnerabilidades
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
        run: |
          python3 core/scanner.py

      - name: Persistir Base de Datos
        # Git para guardar los hallazgos en el repo para que no se pierdan entre ejecuciones
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add database/inventory.db
          git commit -m "Update inventory database [skip ci]" || echo "No changes to commit"
          git push
